<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Estimate | Thachar Decors</title>
  <style>
    :root {
      --bg: #f7f1e8;
      --card: #ffffff;
      --text: #231a13;
      --muted: #6d5c4d;
      --line: rgba(92, 70, 46, 0.14);
      --accent: #8a4d22;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(138, 77, 34, 0.12), transparent 24%),
        linear-gradient(135deg, #f8f3ea 0%, #fdfbf8 50%, #efe5d9 100%);
    }

    .card {
      width: min(560px, 100%);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 24px 60px rgba(58, 39, 22, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      font: inherit;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button,
    a {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    button {
      color: #fff;
      background: linear-gradient(135deg, #8a4d22 0%, #6d3818 100%);
    }

    a {
      color: var(--text);
      background: #f3eadf;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Customer Estimate</h1>
    <p>Enter the estimate number to open the detailed quotation and payment page.</p>

    <label for="estimateId">Estimate Number</label>
    <input id="estimateId" type="text" placeholder="Example: EST26-0223">

    <div class="actions">
      <button id="openEstimate" type="button">Open Estimate</button>
      <a href="index.html">Open Admin Software</a>
    </div>
  </main>

  <script>
    const input = document.getElementById("estimateId");
    const button = document.getElementById("openEstimate");

    function openEstimate() {
      const value = input.value.trim();
      if (!value) {
        input.focus();
        return;
      }
      window.location.href = `index.html?estimate=${encodeURIComponent(value)}`;
    }

    button.addEventListener("click", openEstimate);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        openEstimate();
      }
    });
  </script>
</body>
</html>
